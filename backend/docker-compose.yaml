services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football_app
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - football_net

  db:
    image: postgres:16
    container_name: football_db
    restart: always
    environment:
      POSTGRES_DB: football_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - football_net

volumes:
  pgdata:

networks:
  football_net: